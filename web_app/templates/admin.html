<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - Tikpan AI Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =============================================
   ADMIN PANEL - Professional Redesign
   ============================================= */
:root {
  --bg: #f4f6fb;
  --bg2: #ffffff;
  --bg3: #eef0f7;
  --text: #111827;
  --text2: #6b7280;
  --text3: #9ca3af;
  --border: #e5e7eb;
  --border2: #d1d5db;
  --card: #ffffff;
  --card-border: rgba(99,102,241,0.07);
  --accent: #6366f1;
  --accent2: #4f46e5;
  --accent-light: rgba(99,102,241,0.07);
  --accent-mid: rgba(99,102,241,0.12);
  --accent-glow: rgba(99,102,241,0.18);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.08);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.08);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --font: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --nav-bg: rgba(244,246,251,0.88);
}

[data-theme="dark"] {
  --bg: #080810;
  --bg2: #0d0d1a;
  --bg3: #14141f;
  --text: #e8ecf4;
  --text2: #8b92a5;
  --text3: #555b73;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --card: #111120;
  --card-hover: #171728;
  --card-border: rgba(255,255,255,0.05);
  --accent-light: rgba(99,102,241,0.10);
  --accent-mid: rgba(99,102,241,0.18);
  --accent-glow: rgba(99,102,241,0.28);
  --nav-bg: rgba(8,8,16,0.90);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

/* Top Nav */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:56px;
  background:var(--nav-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 24px;gap:8px;
}

.header h1{
  font-size:16px;font-weight:700;letter-spacing:-0.3px;
  background:linear-gradient(135deg,#818cf8,#6366f1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  flex-shrink:0;
}

.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}

.header a{
  padding:5px 12px;border-radius:var(--radius-sm);
  font-size:12px;color:var(--text2);text-decoration:none;
  border:1px solid var(--border);
  transition:all .15s;
}

.header a:hover{color:var(--text);border-color:var(--accent);background:var(--accent-light)}

/* Layout */
.layout{
  position:fixed;top:56px;left:0;right:0;bottom:0;
  display:flex;overflow:hidden;
}

/* Sidebar */
.sidebar{
  width:210px;flex-shrink:0;
  background:var(--card);
  border-right:1px solid var(--border);
  padding:12px 0;overflow-y:auto;
}

.side-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 16px;
  font-size:13px;font-weight:500;
  color:var(--text2);
  cursor:pointer;border:none;background:none;
  border-left:3px solid transparent;
  width:100%;text-align:left;
  transition:all .15s;
}

.side-item:hover{
  background:var(--accent-light);
  color:var(--text);
}

.side-item.active{
  background:var(--accent-light);
  color:var(--accent);
  border-left-color:var(--accent);
  font-weight:600;
}

.side-item .icon{font-size:14px}

/* Main */
.main{
  flex:1;overflow-y:auto;
  padding:20px 24px;
}

/* Page title */
.page-title{
  font-size:22px;font-weight:700;
  letter-spacing:-0.3px;
  margin-bottom:6px;
}

.page-desc{font-size:13px;color:var(--text2);margin-bottom:20px}

/* Cards */
.card{
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  padding:20px 22px;
  margin-bottom:16px;
  box-shadow:var(--shadow-card);
  transition:border-color .2s;
}

.card:hover{border-color:rgba(99,102,241,0.12)}

.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
  padding-bottom:12px;
  border-bottom:1px solid var(--border);
}

.card-title{
  font-size:12px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.6px;
  display:flex;align-items:center;gap:6px;
}

.card-title .icon{font-size:14px}

/* Notice */
.notice{
  background:var(--accent-light);
  border:1px solid rgba(99,102,241,0.12);
  border-radius:var(--radius-sm);
  padding:10px 14px;
  font-size:12px;color:var(--accent);
  margin-bottom:16px;
  line-height:1.5;
}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}

th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{
  color:var(--text3);font-weight:600;font-size:10.5px;
  text-transform:uppercase;letter-spacing:.5px;
  background:var(--bg3);
}

tr:hover td{background:var(--bg3)}

td code{
  font-family:monospace;font-size:11px;
  color:var(--accent);background:var(--accent-light);
  padding:1px 6px;border-radius:4px;
}

/* Tags */
.tag{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;
}

.tag-blue{background:var(--accent-light);color:var(--accent)}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-red{background:var(--red-bg);color:var(--red)}
.tag-amber{background:var(--amber-bg);color:var(--amber)}
.tag-gray{background:var(--bg3);color:var(--text3)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 12px;border:none;border-radius:var(--radius-sm);
  font-size:12px;font-weight:500;cursor:pointer;
  transition:all .15s;font-family:var(--font);
  border:1px solid transparent;
}

.btn-primary{
  background:linear-gradient(135deg,#818cf8,#6366f1);
  color:#fff;box-shadow:0 2px 10px rgba(99,102,241,0.2);
}

.btn-primary:hover{opacity:.88;transform:translateY(-1px)}

.btn-edit{
  background:var(--bg3);color:var(--text2);
  border-color:var(--border);
}

.btn-edit:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-danger:hover{opacity:.85}

.btn-sm{padding:4px 10px;font-size:11px}

/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}

label{
  display:block;font-size:12px;font-weight:600;
  margin-bottom:5px;color:var(--text);
}

input,select,textarea{
  width:100%;padding:8px 12px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:13px;color:var(--text);
  background:var(--bg2);
  transition:all .2s;
  font-family:var(--font);
}

input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}

input[readonly]{opacity:.5;cursor:not-allowed}

textarea{min-height:80px;resize:vertical}

.actions{
  display:flex;gap:8px;justify-content:flex-end;
  margin-top:16px;padding-top:16px;
  border-top:1px solid var(--border);
}

/* Badge */
.badge{
  display:inline-block;padding:1px 6px;
  border-radius:4px;font-size:10px;
  background:var(--bg3);color:var(--text3);
  margin-left:4px;
}

/* Empty */
.empty{
  text-align:center;padding:40px;
  color:var(--text3);font-size:13px;
}

.empty-icon{font-size:32px;opacity:.3;margin-bottom:8px}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>⚙️ 管理后台</h1>
  <div class="header-right">
    <a href="/" target="_blank">🏠 前台</a>
    <a href="#" onclick="logout()">🚪 退出</a>
  </div>
</div>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <button class="side-item active" onclick="showTab('categories', this)">
      <span class="icon">📂</span> 分类管理
    </button>
    <button class="side-item" onclick="showTab('models', this)">
      <span class="icon">🧬</span> 模型管理
    </button>
    <button class="side-item" onclick="showTab('fields', this)">
      <span class="icon">📋</span> 字段管理
    </button>
    <button class="side-item" onclick="showTab('settings', this)">
      <span class="icon">⚙️</span> 系统设置
    </button>
    <button class="side-item" onclick="showTab('about', this)">
      <span class="icon">ℹ️</span> 关于
    </button>
  </div>

  <!-- Main -->
  <div class="main" id="main-content"></div>
</div>

<script>
let categories = [];
let models = [];
let selectedModelId = null;

async function api(url, method='GET', body=null) {
  const opts = {method, headers:{}};
  if (body) { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const resp = await fetch(url, opts);
  if (!resp.ok) throw await resp.json();
  return resp.json();
}

async function logout() {
  await fetch('/admin/logout');
  location.href='/admin';
}

function showTab(tab, btn) {
  document.querySelectorAll('.side-item').forEach(a=>a.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (tab==='categories') renderCategories();
  else if (tab==='models') renderModels();
  else if (tab==='fields') renderFields();
  else if (tab==='settings') renderSettings();
  else if (tab==='about') renderAbout();
}

// ===== Categories =====
async function renderCategories() {
  categories = await api('/admin/api/categories');
  const h = [
    `<div class="page-title">📂 分类管理</div>`,
    `<div class="page-desc">分类是模型的容器，例如"图像生成"、"音乐生成"</div>`,
    `<div class="notice">💡 新增一个分类后，就可以在其中添加具体模型。每个分类对应侧边栏的一个分组。</div>`,
    `<div class="card">
      <div class="card-header">
        <div class="card-title"><span class="icon">📂</span> 全部分类 (${categories.length})</div>
        <button class="btn btn-primary btn-sm" onclick="showAddCat()">+ 新增分类</button>
      </div>`,
  ];
  if (categories.length===0) h.push('<div class="empty"><div class="empty-icon">📂</div>暂无分类</div>');
  else {
    h.push('<table><tr><th>排序</th><th>标识</th><th>名称</th><th>图标</th><th>操作</th></tr>');
    for (const c of categories) {
      h.push(`<tr>
        <td>${c.sort_order||'—'}</td>
        <td><code>${c.key}</code></td>
        <td>${c.name}</td>
        <td>${c.icon||'📦'}</td>
        <td>
          <button class="btn btn-sm btn-edit" onclick="editCat(${c.id})">编辑</button>
          <button class="btn btn-sm btn-danger" onclick="delCat(${c.id})">删除</button>
        </td>
      </tr>`);
    }
    h.push('</table>');
  }
  h.push('</div>');
  document.getElementById('main-content').innerHTML = h.join('');
}

function showAddCat() { showCatForm(null); }
function editCat(id) { showCatForm(categories.find(c=>c.id===id)); }

function showCatForm(cat) {
  const isEdit = !!cat;
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">${isEdit?'✏️ 编辑':'➕ 新增'}分类</div>
    <div class="card">
      <div class="form-row">
        <div><label>标识 Key</label><input id="cat-key" value="${cat?.key||''}" ${isEdit?'readonly':''} placeholder="如：image_generation"></div>
        <div><label>名称</label><input id="cat-name" value="${cat?.name||''}" placeholder="如：🖼️ 图像生成"></div>
      </div>
      <div class="form-row">
        <div><label>图标</label><input id="cat-icon" value="${cat?.icon||'📦'}" placeholder="如：🖼️"></div>
        <div><label>排序</label><input id="cat-sort" type="number" value="${cat?.sort_order||0}"></div>
      </div>
      <div class="actions">
        <button class="btn btn-edit" onclick="renderCategories()">取消</button>
        <button class="btn btn-primary" onclick="saveCat('${isEdit?cat.id:''}')">💾 保存</button>
      </div>
    </div>`;
}

async function saveCat(id) {
  const data = {
    key: document.getElementById('cat-key').value,
    name: document.getElementById('cat-name').value,
    icon: document.getElementById('cat-icon').value,
    sort_order: parseInt(document.getElementById('cat-sort').value)
  };
  if (id) await api(`/admin/api/categories/${id}`, 'PUT', data);
  else await api('/admin/api/categories', 'POST', data);
  renderCategories();
}

async function delCat(id) {
  if (!confirm('确定删除此分类？')) return;
  await api(`/admin/api/categories/${id}`, 'DELETE');
  renderCategories();
}

// ===== Models =====
async function renderModels() {
  categories = await api('/admin/api/categories');
  models = await api('/admin/api/models');
  let h = [
    `<div class="page-title">🧬 模型管理</div>`,
    `<div class="page-desc">模型是具体的 AI 能力，每个模型需要关联到某个分类</div>`,
    `<div class="notice">💡 模型对应前台的每一个可选项，如 "Gemini 3.1 Flash"。字段定义了模型的表单参数。</div>`,
    `<div class="card">
      <div class="card-header">
        <div class="card-title"><span class="icon">🧬</span> 全部模型 (${models.length})</div>
        <button class="btn btn-primary btn-sm" onclick="showAddModel()">+ 新增模型</button>
      </div>`,
  ];
  if (models.length===0) h.push('<div class="empty"><div class="empty-icon">🧬</div>暂无模型</div>');
  else {
    h.push('<table><tr><th>排序</th><th>模型ID</th><th>名称</th><th>分类</th><th>API类型</th><th>状态</th><th>操作</th></tr>');
    for (const m of models) {
      const cat = categories.find(c=>c.key===m.category_key);
      h.push(`<tr>
        <td>${m.sort_order||'—'}</td>
        <td><code>${m.id}</code></td>
        <td>${m.name}</td>
        <td>${cat?cat.name:m.category_key}</td>
        <td><span class="tag tag-blue">${m.api_type}</span></td>
        <td><span class="tag ${m.is_active?'tag-green':'tag-red'}">${m.is_active?'上线':'下线'}</span></td>
        <td>
          <button class="btn btn-sm btn-edit" onclick="editModel('${m.id}')">编辑</button>
          <button class="btn btn-sm btn-edit" onclick="manageFields('${m.id}')">字段</button>
          <button class="btn btn-sm btn-danger" onclick="delModel('${m.id}')">删除</button>
        </td>
      </tr>`);
    }
    h.push('</table>');
  }
  h.push('</div>');
  document.getElementById('main-content').innerHTML = h.join('');
}

function manageFields(id) {
  selectedModelId = id;
  showTab('fields');
}

function showAddModel() { showModelForm(null); }
function editModel(id) { showModelForm(models.find(m=>m.id===id)); }

async function showModelForm(model) {
  categories = await api('/admin/api/categories');
  const isEdit = !!model;
  const catOpts = categories.map(c => `<option value="${c.key}" ${model?.category_key===c.key?'selected':''}>${c.name}</option>`).join('');
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">${isEdit?'✏️ 编辑':'➕ 新增'}模型</div>
    <div class="card">
      <div class="form-row">
        <div><label>模型 ID</label><input id="m-id" value="${model?.id||''}" ${isEdit?'readonly':''} placeholder="如：gemini-3-flash"></div>
        <div><label>名称</label><input id="m-name" value="${model?.name||''}" placeholder="如：Gemini 3.1 Flash"></div>
      </div>
      <div class="form-row">
        <div><label>分类</label><select id="m-cat">${catOpts}</select></div>
        <div><label>供应商</label><input id="m-provider" value="${model?.provider||''}" placeholder="如：Google"></div>
      </div>
      <div class="form-row">
        <div><label>API 类型</label><select id="m-api">
          <option value="gemini_native" ${model?.api_type==='gemini_native'?'selected':''}>Gemini 原生</option>
          <option value="doubao" ${model?.api_type==='doubao'?'selected':''}>豆包</option>
          <option value="suno" ${model?.api_type==='suno'?'selected':''}>Suno 音乐</option>
          <option value="grok_video" ${model?.api_type==='grok_video'?'selected':''}>Grok 视频</option>
        </select></div>
        <div><label>API 端点</label><input id="m-endpoint" value="${model?.endpoint||''}" placeholder="如：/v1beta/models/..."></div>
      </div>
      <div><label>描述</label><input id="m-desc" value="${model?.description||''}" placeholder="模型简介..."></div>
      <div class="form-row">
        <div><label>排序</label><input id="m-sort" type="number" value="${model?.sort_order||0}"></div>
        <div><label>状态</label><select id="m-active">
          <option value="1" ${model?.is_active===1||model?.is_active===undefined?'selected':''}>上线</option>
          <option value="0" ${model?.is_active===0?'selected':''}>下线</option>
        </select></div>
      </div>
      <div class="actions">
        <button class="btn btn-edit" onclick="renderModels()">取消</button>
        <button class="btn btn-primary" onclick="saveModel('${isEdit?model.id:''}')">💾 保存</button>
      </div>
    </div>`;
}

async function saveModel(id) {
  const data = {
    id: document.getElementById('m-id').value,
    category_key: document.getElementById('m-cat').value,
    name: document.getElementById('m-name').value,
    provider: document.getElementById('m-provider').value,
    description: document.getElementById('m-desc').value,
    api_type: document.getElementById('m-api').value,
    endpoint: document.getElementById('m-endpoint').value,
    sort_order: parseInt(document.getElementById('m-sort').value),
    is_active: parseInt(document.getElementById('m-active').value),
  };
  if (id) await api(`/admin/api/models/${id}`, 'PUT', data);
  else await api('/admin/api/models', 'POST', data);
  renderModels();
}

async function delModel(id) {
  if (!confirm(`确定删除模型 "${id}"？其所有字段也将被删除。`)) return;
  await api(`/admin/api/models/${id}`, 'DELETE');
  renderModels();
}

// ===== Fields =====
async function renderFields() {
  categories = await api('/admin/api/categories');
  models = await api('/admin/api/models');
  let h = [
    `<div class="page-title">📋 字段管理</div>`,
    `<div class="page-desc">字段是模型表单中的输入控件，控制用户能看到哪些参数</div>`,
    `<div class="notice">💡 选择一个模型来管理它的字段。每个字段对应一个表单控件。</div>`,
    `<div class="card">
      <div class="form-row" style="grid-template-columns:1fr">
        <div><label>选择模型</label><select onchange="loadFields(this.value)"><option value="">-- 请选择 --</option>`;
  for (const m of models) h.push(`<option value="${m.id}" ${m.id===selectedModelId?'selected':''}>${m.name} (${m.id})</option>`);
  h.push('</select></div></div></div>');

  if (selectedModelId) {
    const fields = await api(`/admin/api/models/${selectedModelId}/fields`);
    h.push(`<div class="card">
      <div class="card-header">
        <div class="card-title"><span class="icon">📋</span> ${selectedModelId} 的字段 (${fields.length})</div>
        <button class="btn btn-primary btn-sm" onclick="showAddField()">+ 新增字段</button>
      </div>`);
    if (fields.length===0) h.push('<div class="empty"><div class="empty-icon">📋</div>暂无字段</div>');
    else {
      h.push('<table><tr><th>排序</th><th>Key</th><th>类型</th><th>标签</th><th>必填</th><th>默认值</th><th>操作</th></tr>');
      for (const f of fields) {
        h.push(`<tr>
          <td>${f.sort_order||'—'}</td>
          <td><code>${f.field_key}</code></td>
          <td><span class="tag tag-blue">${f.field_type}</span></td>
          <td>${f.label}</td>
          <td><span class="tag ${f.required?'tag-green':'tag-gray'}">${f.required?'是':'否'}</span></td>
          <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${f.default_value||'—'}</td>
          <td>
            <button class="btn btn-sm btn-edit" onclick="editField(${f.id})">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="delField(${f.id})">删除</button>
          </td>
        </tr>`);
      }
      h.push('</table>');
    }
    h.push('</div>');
  }
  document.getElementById('main-content').innerHTML = h.join('');
}

function loadFields(modelId) {
  selectedModelId = modelId;
  renderFields();
}

function showAddField() { showFieldForm(null); }
async function editField(id) {
  const fields = await api(`/admin/api/models/${selectedModelId}/fields`);
  showFieldForm(fields.find(f=>f.id===id));
}

function showFieldForm(field) {
  const isEdit = !!field;
  const extra = field?.field_type==='select' ? JSON.parse(field?.options_json||'[]') : [];
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">${isEdit?'✏️ 编辑':'➕ 新增'}字段</div>
    <div class="card">
      <div class="form-row">
        <div><label>字段 Key</label><input id="f-key" value="${field?.field_key||''}" ${isEdit?'readonly':''} placeholder="如：prompt"></div>
        <div><label>标签</label><input id="f-label" value="${field?.label||''}" placeholder="如：📝 提示词"></div>
      </div>
      <div class="form-row">
        <div>
          <label>类型</label>
          <select id="f-type" onchange="toggleFieldOpts()">
            <option value="textarea" ${field?.field_type==='textarea'?'selected':''}>多行文本</option>
            <option value="text" ${field?.field_type==='text'?'selected':''}>单行文本</option>
            <option value="select" ${field?.field_type==='select'?'selected':''}>下拉选择</option>
            <option value="number" ${field?.field_type==='number'?'selected':''}>数字</option>
            <option value="checkbox" ${field?.field_type==='checkbox'?'selected':''}>复选框</option>
            <option value="file_image" ${field?.field_type==='file_image'?'selected':''}>上传图片</option>
            <option value="select_group" ${field?.field_type==='select_group'?'selected':''}>分组选择器</option>
          </select>
        </div>
        <div><label>排序</label><input id="f-sort" type="number" value="${field?.sort_order||0}"></div>
      </div>
      <div class="form-row">
        <div><label>占位文本</label><input id="f-placeholder" value="${field?.placeholder||''}"></div>
        <div><label>默认值</label><input id="f-default" value="${field?.default_value||''}"></div>
      </div>
      <div class="form-row">
        <div><label>必填</label><select id="f-required"><option value="1" ${field?.required?'selected':''}>是</option><option value="0" ${!field?.required?'selected':''}>否</option></select></div>
        <div><label>行数 (多行文本)</label><input id="f-rows" type="number" value="${field?.rows||4}"></div>
      </div>
      <div id="f-select-opts" style="${(field?.field_type==='select'||field?.field_type==='file_image')?'':'display:none'}">
        <label>选项（每行一个）</label>
        <textarea id="f-options" rows="4" placeholder="每行一个选项">${extra.join('\n')}</textarea>
      </div>
      <div id="f-file-opts" style="${field?.field_type==='file_image'?'':'display:none'}">
        <div class="form-row" style="grid-template-columns:1fr">
          <div><label>最大文件数</label><input id="f-maxcount" type="number" value="${field?.max_count||14}"></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-edit" onclick="renderFields()">取消</button>
        <button class="btn btn-primary" onclick="saveField('${isEdit?field.id:''}')">💾 保存</button>
      </div>
    </div>`;
}

function toggleFieldOpts() {
  const t = document.getElementById('f-type').value;
  document.getElementById('f-select-opts').style.display = t==='select'||t==='file_image'?'':'none';
  document.getElementById('f-file-opts').style.display = t==='file_image'?'':'none';
}

async function saveField(id) {
  const data = {
    field_key: document.getElementById('f-key').value,
    field_type: document.getElementById('f-type').value,
    label: document.getElementById('f-label').value,
    placeholder: document.getElementById('f-placeholder').value,
    default_value: document.getElementById('f-default').value,
    required: parseInt(document.getElementById('f-required').value),
    rows: parseInt(document.getElementById('f-rows').value),
    sort_order: parseInt(document.getElementById('f-sort').value),
    options: [],
    max_count: 0,
  };
  if (data.field_type==='select') data.options = document.getElementById('f-options').value.split('\n').filter(s=>s.trim());
  if (data.field_type==='file_image') { data.max_count = parseInt(document.getElementById('f-maxcount').value); data.multiple = true; }
  if (id) await api(`/admin/api/fields/${id}`, 'PUT', data);
  else await api(`/admin/api/models/${selectedModelId}/fields`, 'POST', data);
  renderFields();
}

async function delField(id) {
  if (!confirm('确定删除此字段？')) return;
  await api(`/admin/api/fields/${id}`, 'DELETE');
  renderFields();
}
